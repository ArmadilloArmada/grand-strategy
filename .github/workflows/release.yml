name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.2)'
        required: true
        default: 'v0.1.2'
      signed_build:
        description: 'Sign Windows builds (requires CSC_LINK secrets)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release-windows:
    name: Windows installer + ZIP
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --run

      - name: Validate maps
        run: npm run validate:maps

      - name: Build Windows release (unsigned)
        if: github.event_name != 'workflow_dispatch' || inputs.signed_build != true
        run: npm run dist

      - name: Build Windows release (signed)
        if: github.event_name == 'workflow_dispatch' && inputs.signed_build == true
        run: npm run dist
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

      - name: Upload Windows release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            release/Grand Strategy Setup *.exe
            release/Grand Strategy Setup *.exe.blockmap
            release/Grand Strategy-*-win-x64.zip
            release/SHA256SUMS.txt
            release/VERIFY_DOWNLOAD.md
            release/latest.yml
          retention-days: 30

  publish:
    name: Publish GitHub Release
    needs: [release-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-windows
          path: dist-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: Grand Strategy ${{ steps.tag.outputs.value }}
          body_path: dist-assets/VERIFY_DOWNLOAD.md
          generate_release_notes: true
          files: |
            dist-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
