name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Test, Validate Maps, Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Release check (tests, maps, build)
        run: npm run release:check

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: E2E golden path smoke
        run: npm run test:e2e

  ship-smoke:
    name: Ship checklist automation
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Steam structure preflight
        run: npm run steam:preflight:structure

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Ship smoke E2E (mobilize + 2-faction)
        run: npm run test:e2e:ship

      - name: Performance smoke gate
        run: npm run test:e2e:perf

      - name: Electron structural smoke
        run: npm run build && npm run smoke:electron

      - name: Multiplayer lobby smoke
        run: npm run smoke:multiplayer
